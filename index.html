<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Shoebox Viewer</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="introOverlay">
    <img
      id="introAnimation"
      src="assets/intro.png"
      alt=""
    />
  </div>

  <div id="workspace"></div>

  <div id="legend" class="legend">
    <p>drag to move</p>
    <p>scroll or pinch to resize</p>
    <p>double-click to learn more</p>
  </div>

  <div id="infoCard" class="info-card hidden">
    <button id="closeInfo">×</button>

    <h3 id="infoTitle"></h3>

    <p id="infoText"></p>
  </div>

  <script src="blurbs.js"></script>
  <script src="script.js"></script>

</body>
</html>
