<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Shoebox Viewer</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="introOverlay">
    <img
      id="introAnimation"
      src="assets/intro.png"
      alt=""
    />
  </div>

  <div id="workspace"></div>

  <div id="legend" class="legend">
    <p>drag to move</p>
    <p>scroll or pinch to resize</p>
    <p>double-click to learn more</p>
  </div>

  <div id="audioWidget" class="audio-widget">
    <div class="audio-screen">
      <span id="audioTrackTitle">shoebox radio</span>
      <span id="audioStatus">paused</span>
    </div>

    <div class="audio-controls">
      <button id="prevTrackButton">prev</button>
      <button id="playPauseButton">play</button>
      <button id="nextTrackButton">next</button>
      <button id="muteButton">mute</button>
    </div>

    <label class="volume-row">
      <span>vol</span>
      <input
        id="volumeSlider"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0.35"
      />
    </label>
  </div>

  <audio id="backgroundAudio" loop></audio>

  <div id="infoCard" class="info-card hidden">
    <button id="closeInfo">×</button>

    <h3 id="infoTitle"></h3>

    <p id="infoText"></p>
  </div>

  <script src="blurbs.js"></script>
  <script src="script.js"></script>

</body>
</html>
